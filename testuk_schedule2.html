<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Relations and Functions 17 : Finding Range Using Graphs || Equal or Identical Functions || NO DPP</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
:root{--accent:#5a4bda;--bg:#000;--surface:#111118;--surface2:#1c1c27;--border:rgba(255,255,255,.1);--text:#e8e8f0;--muted:#7070a0;--note:#3ecfcf;--dpp:#ff9f43}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',-apple-system,sans-serif;color:var(--text)}
#shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
#main-row{flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden}
#video-col{flex:1;min-width:0;min-height:0;position:relative;background:#000;overflow:hidden}
#vid-box{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block;outline:none}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10}
#ovLoad{background:rgba(0,0,0,.82)}
#ovLoad.off{display:none}
.spinner{width:40px;height:40px;border:3px solid rgba(90,75,218,.18);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
#ovLoad p{font-size:13px;color:rgba(255,255,255,.65)}
#ovErr{background:rgba(0,0,0,.88);display:none;padding:20px;text-align:center}
#ovErr.on{display:flex}
#ovErr p{font-size:14px;color:#ff6584;max-width:300px;line-height:1.5}
#ovErr button{padding:8px 22px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
#bufSpin{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:8;pointer-events:none}
#bufSpin.on{display:flex}
#bufSpin::after{content:'';width:42px;height:42px;border-radius:50%;border:3px solid rgba(90,75,218,.18);border-top-color:var(--accent);animation:spin .75s linear infinite}
#ctrl-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;transition:opacity .35s ease}
#ctrl-overlay.visible{opacity:1;pointer-events:auto}
#ctrl-overlay.hidden{opacity:0;pointer-events:none!important}
#ctrl-overlay.hidden *{pointer-events:none!important}
#tap-shield{position:absolute;inset:0;z-index:19;background:transparent;cursor:pointer;display:none}
#tap-shield.on{display:block}
#player-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(rgba(0,0,0,.72) 0%,transparent 100%);flex-shrink:0;pointer-events:auto}
.hdr-back{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px;flex-shrink:0;transition:transform .12s}
.hdr-back:active{transform:scale(.88)}
.hdr-back svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#player-title{flex:1;min-width:0;font-size:14px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tdBtn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px;flex-shrink:0;position:relative}
#tdBtn>svg{width:22px;height:22px;fill:#fff}
#tdMenu{position:absolute;top:calc(100% + 2px);right:0;background:rgba(12,12,20,.98);border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;min-width:190px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.9)}
#tdMenu.on{display:block}
.tdm-row{display:flex;align-items:center;gap:10px;padding:14px 16px;color:#fff;font-size:14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07)}
.tdm-row:last-child{border-bottom:none}
.tdm-row:active{background:rgba(255,255,255,.08)}
.tdm-row svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none}
#ctrl-mid{flex:1;pointer-events:none}
#player-footer{flex-shrink:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.82) 100%);padding:6px 0 10px;pointer-events:auto}
body.yt-mode #player-footer,body.yt-mode #bufSpin,body.yt-mode #ovLoad,body.yt-mode #ovErr{display:none!important}
.prog-wrap{padding:0 14px 6px}
.time-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.t-left{display:flex;align-items:center;gap:6px}
.t-time{color:#fff;font-size:13px;font-family:monospace;font-weight:500}
.spd-badge{background:rgba(255,255,255,.92);color:#000;font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;font-family:sans-serif}
.live-badge{display:none;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#fff}
.live-badge.on{display:flex}
.live-dot{width:7px;height:7px;border-radius:50%;background:red;animation:blink 1.4s ease infinite}
.bar-wrap{position:relative;height:22px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.bar-bg{position:absolute;left:0;right:0;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.bar-buf{height:100%;background:rgba(255,255,255,.3);position:absolute;left:0;border-radius:2px}
.bar-fill{height:100%;background:var(--accent);position:absolute;left:0;border-radius:2px}
.bar-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border-radius:50%;pointer-events:none;box-shadow:0 0 5px rgba(0,0,0,.6)}
.bar-wrap:hover .bar-thumb{transform:translate(-50%,-50%) scale(1.3)}
.bar-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.btn-row{display:flex;align-items:center;justify-content:space-between;padding:0 6px}
.btn-l,.btn-r{display:flex;align-items:center}
.cbtn{background:none;border:none;color:#fff;cursor:pointer;min-width:44px;min-height:44px;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;outline:none;transition:transform .12s,opacity .12s}
.cbtn:active{transform:scale(.85);opacity:.65}
.vol-grp{display:flex;align-items:center}
.vol-range{-webkit-appearance:none;width:0;height:4px;border-radius:2px;background:rgba(255,255,255,.25);outline:none;cursor:pointer;opacity:0;transition:width .3s,opacity .3s;margin-left:0}
.vol-grp:hover .vol-range,.vol-grp:focus-within .vol-range{width:52px;opacity:1;margin-left:4px}
.vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff}
.vol-range::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:#fff;border:none}
.tl-btn{display:none}
.layout-desktop .tl-btn{display:flex}
#settBd{position:absolute;inset:0;z-index:25;display:none}
#settBd.on{display:block}
#settPanel{position:absolute;bottom:80px;right:8px;width:min(260px,calc(100% - 16px));z-index:30;display:none}
#settPanel.on{display:block}
.sc{background:rgba(10,10,18,.98);border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 4px 32px rgba(0,0,0,.9)}
.s-main{display:flex;flex-direction:column}
.s-main.off{display:none}
.s-sub{display:none;flex-direction:column}
.s-sub.on{display:flex}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:14px 17px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07)}
.s-row:last-child{border-bottom:none}
.s-row:active{background:rgba(255,255,255,.05)}
.s-lbl{color:#fff;font-size:15px;font-weight:500}
.s-val{display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.42);font-size:14px}
.s-back{display:flex;align-items:center;gap:10px;padding:12px 17px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer}
.s-back span{color:#fff;font-size:15px;font-weight:700}
.s-scroll{overflow-y:auto;max-height:220px}
.sopt{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06)}
.sopt:last-child{border-bottom:none}
.sopt.active{background:rgba(90,75,218,.2)}
.sopt span{color:#fff;font-size:14px}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sopt.active .radio{border-color:var(--accent);background:var(--accent)}
.rdot{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.sopt.active .rdot{display:block}
@keyframes sk-l{0%{transform:rotate(0)}50%{transform:rotate(-35deg)}100%{transform:rotate(0)}}
@keyframes sk-r{0%{transform:rotate(0)}50%{transform:rotate(35deg)}100%{transform:rotate(0)}}
.anim-l svg{animation:sk-l .32s ease}
.anim-r svg{animation:sk-r .32s ease}
#side-panel{width:0;overflow:hidden;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:none;flex-direction:column;transition:width .3s cubic-bezier(.4,0,.2,1)}
#side-panel.open{width:340px}
#bottom-panel{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:none;flex-direction:column;height:0;overflow:hidden;transition:height .35s cubic-bezier(.4,0,.2,1)}
#bottom-panel.open{height:50vh}
#shell.layout-desktop #side-panel{display:flex}
#shell.layout-desktop #bottom-panel{display:none!important}
#shell.layout-mobile #bottom-panel{display:flex}
#shell.layout-mobile #side-panel{display:none!important}
#shell.layout-desktop #main-row{flex:1}
.panel-inner{display:flex;flex-direction:column;height:100%;min-height:0}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-hdr-title{font-size:16px;font-weight:700;color:var(--text)}
.panel-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;border-radius:6px}
.panel-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.ptab svg{width:14px;height:14px;flex-shrink:0}
.ptab.active{color:#fff;border-bottom-color:var(--accent)}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.ptab-panel{display:none;padding:12px}
.ptab-panel.active{display:block}
.tl-list{display:flex;flex-direction:column;gap:10px}
.tl-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;background:#000}
.tl-card:hover{border-color:rgba(90,75,218,.5)}
.tl-card.cur{border-color:var(--accent)}
.tl-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#1c1c27}
.tl-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:20px 10px 8px;display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.tl-name{font-size:12px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.tl-ts{background:rgba(0,0,0,.5);color:#fff;font-family:monospace;font-size:10px;padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.tl-cur-badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:none;letter-spacing:.3px}
.tl-card.cur .tl-cur-badge{display:block}
.acc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:8px}
.acc-hdr:active{background:rgba(255,255,255,.04)}
.acc-hl{display:flex;align-items:center;gap:8px}
.acc-ic{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acc-ic svg{width:12px;height:12px}
.ni{background:rgba(62,207,207,.15)}.ni svg{fill:var(--note)}
.di{background:rgba(255,159,67,.15)}.di svg{fill:var(--dpp)}
.acc-title{font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.nt{color:var(--note)}.dt{color:var(--dpp)}
.acc-cnt{font-size:10px;padding:1px 6px;border-radius:20px}
.nc{background:rgba(62,207,207,.12);color:var(--note)}.dc{background:rgba(255,159,67,.12);color:var(--dpp)}
.acc-chev{width:16px;height:16px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.acc-chev svg{width:16px;height:16px;stroke:currentColor;fill:none}
.acc.open .acc-chev{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.acc.open .acc-body{max-height:2000px}
.acc-inner{border-top:1px solid var(--border)}
.att-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.att-item:last-child{border-bottom:none}
.att-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nd{background:var(--note)}.dd{background:var(--dpp)}
.att-name{flex:1;font-size:13px;color:var(--text);line-height:1.4;word-break:break-word;min-width:0}
.att-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.att-btn{width:32px;height:32px;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s,color .12s;flex-shrink:0}
.att-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}
.att-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.att-btn.preview:hover{background:rgba(62,207,207,.15);border-color:var(--note);color:var(--note)}
.att-btn.open-tab:hover{background:rgba(90,75,218,.18);border-color:var(--accent);color:#a89dff}
.att-btn.download:hover{background:rgba(255,159,67,.15);border-color:var(--dpp);color:var(--dpp)}
.pdf-preview-wrap{display:flex;flex-direction:column;height:100%}
.pdf-preview-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.pdf-back-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#fff;border-radius:6px}
.pdf-back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
.pdf-preview-title{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-frame-container{flex:1;overflow-y:auto;overflow-x:auto;background:#1a1a28;-webkit-overflow-scrolling:touch}
.pdf-canvas-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px}
.pdf-page-canvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.pdf-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted)}
.pdf-loading .spinner{border-top-color:var(--note)}
.pdf-loading p{font-size:13px}
.pdf-err{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;padding:20px;text-align:center}
.pdf-err p{font-size:13px;color:var(--muted);line-height:1.5}
.pdf-err a{color:var(--note);font-size:13px;font-weight:600;text-decoration:none}
.no-items{text-align:center;padding:36px 16px;color:var(--muted);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:.2}}
</style>
</head>

<div id="shell">
  <div id="main-row">
    <div id="video-col">
      <div id="vid-box">
        <video id="vid" playsinline preload="auto"></video>
        <div class="ov" id="ovLoad"><div class="spinner"></div><p id="loadMsg">Initializing…</p></div>
        <div class="ov" id="ovErr"><span style="font-size:28px">⚠️</span><p id="errMsg">Something went wrong.</p><button id="retryBtn">Retry</button></div>
        <div id="bufSpin"></div>
      </div>
      <div id="tap-shield"></div>
      <div id="ctrl-overlay" class="visible">
        <div id="player-header">
          <button class="hdr-back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
          <div id="player-title"></div>
          <div id="tdBtn">
            <svg viewBox="0 0 24 24"><path fill-rule="evenodd" d="M10.5 6a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Zm0 6a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Zm0 6a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" clip-rule="evenodd"/></svg>

              <div class="tdm-row" id="tdAttach"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>Attachments</div>

          </div>
        </div>
        <div id="ctrl-mid"></div>

            </div>
            <div class="bar-wrap">
              <div class="bar-bg"><div class="bar-buf" id="barBuf" style="width:0%"></div><div class="bar-fill" id="barFill" style="width:0%"></div></div>
              <div class="bar-thumb" id="barThumb" style="left:0%"></div>
              <input type="range" class="bar-input" id="seekBar" min="0" max="1000" step="1" value="0">
            </div>
          </div>
          <div class="btn-row">
            <div class="btn-l">
              <button class="cbtn" id="playBtn">
                <svg id="iPlay" width="34" height="34" viewBox="0 0 24 24" fill="white"><path d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"/></svg>
                <svg id="iPause" width="34" height="34" viewBox="0 0 24 24" fill="white" style="display:none"><path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 01.75-.75H9a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H7.5a.75.75 0 01-.75-.75V5.25zm7.5 0A.75.75 0 0115 4.5h1.5a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H15a.75.75 0 01-.75-.75V5.25z" clip-rule="evenodd"/></svg>

}

function downloadPDF(url, name) {
  if (!url) { alert('No file URL available.'); return; }
  let fileName = (name.trim().toLowerCase().endsWith('.pdf') ? name.trim() : name.trim()+'.pdf')
    .replace(/:/g,' -').replace(/[/\\?%*|"<>]/g,'-').replace(/ {2,}/g,' ').trim();
  fetch(url).then(r => { if (!r.ok) throw 0; return r.blob(); })
    .then(blob => {
      const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: fileName });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    })
    .catch(() => {
      const a = Object.assign(document.createElement('a'), { href: url, download: fileName, target: '_blank', rel: 'noopener' });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);

function swTab(btn, tab) {
  const pi = btn.closest('.panel-inner');
  pi.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  pi.querySelectorAll('.ptab-panel').forEach(p => p.classList.toggle('active', p.dataset.p === tab));
  pi.querySelector('.panel-hdr-title').textContent = tab === 'tl' ? 'Timeline' : 'Attachments';
  if (tab === 'tl') syncSlide(true);
}

function getActivePanelInner() {
  return document.getElementById(isDesktopLayout() ? 'panelInner' : 'panelInnerMob');
}

function activateTab(pi, tab) {
  pi.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  pi.querySelectorAll('.ptab-panel').forEach(p => p.classList.toggle('active', p.dataset.p === tab));
  pi.querySelector('.panel-hdr-title').textContent = tab === 'tl' ? 'Timeline' : 'Attachments';
}

function openPanel(tab) {
  curTab = tab || 'tl'; panelOpen = true;
  if (isDesktopLayout()) {
    document.getElementById('bottom-panel').classList.remove('open');
    const pi = document.getElementById('panelInner');
    const pw = pi.querySelector('#pdfPreviewWrap');
    if (pw && pw.style.display !== 'none') closePDFPreview(pi);
    activateTab(pi, curTab);
    document.getElementById('side-panel').classList.add('open');
  } else {
    document.getElementById('side-panel').classList.remove('open');
    const pi = document.getElementById('panelInnerMob');
    const pw = pi.querySelector('#pdfPreviewWrap');
    if (pw && pw.style.display !== 'none') closePDFPreview(pi);
    activateTab(pi, curTab);
    document.getElementById('bottom-panel').classList.add('open');
  }
  if (curTab === 'tl') setTimeout(() => syncSlide(true), 80);
}

function closePanel() {
  panelOpen = false;
  document.getElementById('bottom-panel').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
}

let tdOpen = false;
document.getElementById('tdBtn').addEventListener('click', e => { e.stopPropagation(); tdOpen = !tdOpen; document.getElementById('tdMenu').classList.toggle('on', tdOpen); });
document.addEventListener('click', () => { tdOpen = false; document.getElementById('tdMenu').classList.remove('on'); });

document.getElementById('tlBtn').addEventListener('click', e => { e.stopPropagation(); (panelOpen && isDesktopLayout()) ? closePanel() : openPanel('tl'); });

function seekSlide(ts) {
  const v = window.V;
  if (!v || !isFinite(v.duration) || v.duration <= 0) return;
  v.currentTime = ts; v.play().catch(() => {});
  syncSlide(false);
  if (!isDesktopLayout()) closePanel();
}

function syncSlide(doScroll) {
  if (!SLIDES || !SLIDES.length || !window.V) return;
  const ct = window.V.currentTime;
  let idx = 0;
  for (let i = 0; i < SLIDES.length; i++) { if (ct >= SLIDES[i].timestamp) idx = i; else break; }
  document.querySelectorAll('.tl-card').forEach(el => el.classList.toggle('cur', +el.dataset.idx === idx));
  if (doScroll) {
    const pi = getActivePanelInner();
    const cur = pi ? pi.querySelector('.tl-card.cur') : null;
    if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

  function parseKeys(keys) {
    const norm = s => String(s).replace(/-/g,'').toLowerCase().trim();
    const o = {};
    if (!keys) return o;
    const addPair = (k,v) => { k=norm(k); v=norm(v); if(k&&v) o[k]=v; };
    if (typeof keys==='object' && !Array.isArray(keys)) {
      Object.entries(keys).forEach(([k,v]) => addPair(k,v));
    } else {
      const lines = Array.isArray(keys) ? keys : String(keys).split(/[\n,]+/);
      lines.forEach(s => { s=String(s).trim(); if(!s) return; const i=s.indexOf(':'); if(i>0) addPair(s.slice(0,i),s.slice(i+1)); });
    }

  async function startVideo() {
    hideLoading();
    vid.volume=1; vid.muted=false; volBar.value=100; updVol(); updMuteIcon();
    try { await vid.play(); setPlaying(true); }
    catch { try { vid.muted=true; await vid.play(); vid.muted=false; vid.volume=1; volBar.value=100; updVol(); updMuteIcon(); setPlaying(true); } catch { updMuteIcon(); } }
  }

  function initYouTube(url) {
    showLoading('Loading…','YouTube');
    document.body.classList.add('yt-mode');
    vid.style.display='none'; overlay.style.display='none'; tapShield.style.display='none';
    let src;
    if (url.includes('/embed/')) { try { const u=new URL(url); u.searchParams.set('autoplay','1'); u.searchParams.set('playsinline','1'); src=u.toString(); } catch { src=url; } }
